{% extends 'base.html' %}

{% block title %}
AI-factcheck
{% endblock %}

{% block body %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h1 class="text-center mb-4">Проверка фактов</h1>

            <form method="POST" action="/ai" class="mb-5">
                <div class="form-group">

                    <textarea name="title" class="form-control form-control-lg" rows="3" placeholder="Например: Земля круглая">{{ request.form.get('title', '') }}</textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block mt-3">Проверить факты</button>
            </form>

            {% if result %}
            <div class="card mt-4">
                <div class="card-body">
                    <pre class="mb-0" style="white-space: pre-wrap; font-family: inherit;">{{ result }}</pre>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
    <ul>
        <li><a class="btn btn-success" href="/">Главная страница</a></li>
        <li><a class="btn btn-success" href="/dashboard">Профиль</a></li>
        <li><a class="btn btn-success" href="#">Настройки</a></li>
    </ul>
</div>
<style>
    html {
        background-color: #D3D3D3;
    }
    .row {
        font-family: 'Segoe UI', system-ui, sans-serif;
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
    }
    h1 {
        color: #333;
        margin-bottom: 30px;
        font-weight: 500;
    }

    textarea {
        display: block;
        color: #00000;
        font-size: 20px;
        margin-bottom: 8px;
        font-family: 'Courier New', monospace;
        letter-spacing: 0.5px;
    }
    .btn-primary {
        width: 50%;
        padding: 14px 20px;
        background-color: #D3D3D3;
        border: 1px solid #000000;
        color: #00000;
        font-size: 18px;
        font-family: 'Courier New', monospace;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.3s;
        margin: 20px 0 15px;
        border-radius: 4px;
    }
    pre.mb-0 {
        background: linear-gradient(#D3D3D3, #D3D3D3, #D3D3D3);
        font-family: 'Fira Code', 'Cascadia Code', monospace !important;
        padding: 1.5rem;
        border-radius: 1rem;
        font-size: 0.9rem;
        line-height: 1.6;
        transition: all 0.2s ease;
    }

    pre.mb-0:hover {
        border-left-color: #f59e0b;
        box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(245, 158, 11, 0.3);
        transform: translateY(-2px);
    }

    pre.mb-0::before {
        display: block;
        font-size: 0.7rem;
        font-family: system-ui, sans-serif;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
        color: #94a3b8;
        margin-bottom: 0.75rem;
        border-bottom: 1px dashed #334155;
        padding-bottom: 0.5rem;
    }

    pre.mb-0 code {
        background: transparent;
        color: inherit;
        font-family: inherit;
    }
    ul {
        list-style: none;
        padding: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
        margin-top: 30px;
    }

    .btn {
        display: inline-block;
        padding: 12px 28px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
        transition: all 0.3s ease;
        border: 2px solid transparent;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        cursor: pointer;
        border: 5px solid #e6b8af;
    }
    .btn-success {
        background: linear-gradient(145deg, #D3D3D3, #D3D3D3);
        color: black;
        border: 5px solid #e6b8af;
    }
    .form-control {
        width: 100%;
        padding: 12px 16px;
        background-color: #1a262f;
        border: 1px solid #2e4050;
        border-radius: 4px;
        color: #e5e9f0;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        transition: all 0.2s;
        outline: none;
    }
    .card {
        background-color: rgba(255, 255, 255, 0.85);
        border: none;
        border-radius: 1rem;
        backdrop-filter: blur(2px);
        transition: all 0.3s ease;
    }

    @media (max-width: 768px) {
        .btn-primary {
            width: 100%;
    }

    .row {
            padding: 15px;
    }

    pre.mb-0 {
            padding: 1rem;
            font-size: 0.8rem;
    }
</style>



{% endblock %}
