{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block styles %}
<style>
    .register-box {
        max-width: 500px;
        margin: 0 auto;
    }
    .register-box h2 {
        margin-bottom: 25px;
        text-align: center;
    }
    .register-box input {
        margin: 10px 0;
        padding: 12px;
    }
    .register-box .btn {
        width: 100%;
        margin-top: 10px;
    }
    .register-box p {
        margin-top: 20px;
        text-align: center;
    }
    .register-box a {
        color: #667eea;
        text-decoration: none;
    }
    .register-box a:hover {
        text-decoration: underline;
    }
    body.dark .register-box a {
        color: #8b9eff;
    }
</style>
{% endblock %}
{% block body %}
<div class="card register-box">
    <h2>Регистрация</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Логин (мин 3 символа)" required>
        <input type="email" name="email" placeholder="Email (необязательно)">
        <input type="password" name="password" placeholder="Пароль (мин 6 символов)" required>
        <button type="submit" class="btn">Зарегистрироваться</button>
    </form>
    <p><a href="/login">Уже есть аккаунт?</a></p>
</div>
{% endblock %}
