{% extends 'base.html' %}

{% block title %}Вход в систему{% endblock %}

{% block body %}
<div class="login-container">
    <h2>Вход в систему</h2>

    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Имя пользователя:</label>
            <input type="text" id="username" name="username" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn-primary">Войти</button>
    </form>

    <p class="text-center mt-3">
        Нет аккаунта? <a href="{{ url_for('auto') }}">Зарегистрируйтесь</a>
    </p>
</div>
<style>
    html, body {
        background-color: #D3D3D3;
        font-family: 'Courier New', 'JetBrains Mono', monospace;
        min-height: 100vh;
    }

    .login-container {
        max-width: 600px;
        margin: 50px auto;
        padding: 40px;
        background-color: #D3D3D3;
        border: 1px solid #2a3a4a;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }


    h2 {
        color: #000000;
        font-size: 28px;
        font-weight: 400;
        margin-bottom: 35px;
        padding-bottom: 12px;
        border-bottom: 1px solid #2a3a4a;
        font-family: 'Courier New', monospace;
        position: relative;
    }

    h2::before {
        color: #56b6c2;
        margin-right: 12px;
        font-weight: 700;
        font-size: 24px;
    }

    .form-group {
        margin-bottom: 25px;
    }


    label {
        display: block;
        color: #00000;
        font-size: 16px;
        margin-bottom: 8px;
        font-family: 'Courier New', monospace;
        letter-spacing: 0.5px;
    }

    .form-control {
        width: 100%;
        padding: 12px 16px;
        background-color: #1a262f;
        border: 1px solid #2e4050;
        border-radius: 4px;
        color: #e5e9f0;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        transition: all 0.2s;
        outline: none;
    }


    .btn-primary {
        width: 100%;
        padding: 14px 20px;
        background-color: #D3D3D3;
        border: 1px solid #56b6c2;
        color: #56b6c2;
        font-size: 18px;
        font-family: 'Courier New', monospace;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.3s;
        margin: 20px 0 15px;
        border-radius: 4px;
    }

    .btn-primary:hover {
        background-color: #56b6c2;
        color: #0f1519;
        box-shadow: 0 0 20px rgba(86, 182, 194, 0.5);
    }

    .text-center {
        text-align: center;
        color: #a0b5c5;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        border-top: 1px dashed #2a3a4a;
        padding-top: 20px;
        margin-top: 10px;
    }

    .text-center a {
        color: #000000;
        text-decoration: none;
        font-weight: bold;
        transition: 0.2s;
        margin-left: 5px;
    }
</style>
{% endblock %}
