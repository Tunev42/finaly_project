{% extends 'base.html' %}
{% block title %}Оплата{% endblock %}
{% block styles %}
<style>
    .payment-box {
        text-align: center;
        max-width: 500px;
        margin: 0 auto;
    }
    .payment-box h2 {
        margin-bottom: 20px;
    }
    .payment-box p {
        margin: 15px 0;
    }
</style>
{% endblock %}
{% block body %}
<div class="card payment-box">
    <h2>Оплата премиум доступа</h2>
    <p>Перенаправление на платёжный шлюз...</p>
    <p style="font-size: 14px; color: #888;">Оплата через Telegram Stars</p>
    <a href="{{ confirmation_url }}" class="btn" style="margin-top: 20px;">Перейти к оплате</a>
</div>
{% endblock %}
