{% extends 'base.html' %}
{% block title %}Главная{% endblock %}
{% block styles %}
<style>
    .hero {
        text-align: center;
        padding: 60px 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
    }
    .hero h1 {
        font-size: 5rem;
        margin-bottom: 20px;
        background: linear-gradient(135deg, #fff, #e0d4ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }
    .hero p {
        font-size: 1.5rem;
        margin: 20px 0;
        color: rgba(255, 255, 255, 0.9);
    }
    .hero .card {
        max-width: 600px;
        margin: 0 auto;
    }
    .hero .card p {
        font-size: 1.2rem;
        margin: 10px 0;
    }
</style>
{% endblock %}
{% block body %}
<div class="hero">
    <h1>ФактЧекер</h1>
    <p>Проверь, правда или фейк</p>
    <div class="card">
        <p>5 проверок в день бесплатно</p>
        <p>Премиум — безлимит</p>
        <div style="margin-top: 30px;">
            <a href="/auto" class="btn">Начать</a>
        </div>
    </div>
</div>
{% endblock %}
