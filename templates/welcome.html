{%extends 'base.html'%}
{% block title %}
Главная страница
{% endblock %}

{% block body %}
<div class="container">
    <h1>Главная страница</h1>
    <ul>
        <li><a class="btn btn-success" href="/">Главная страница</a></li>
        <li><a class="btn btn-success" href="/auto">Регистрация</a></li>
        <li><a class="btn btn-success" href="/auto">Вход</a></li>
        <li><a class="btn btn-success" href="/ai">ИИ</a></li>
    </ul>
</div>
<style>
    html {
        background-color: #D3D3D3;
    }

    .container {
    font-family: 'Segoe UI', system-ui, sans-serif;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    }

    h1 {
        color: #333;
        margin-bottom: 30px;
        font-weight: 500;
    }
    ul {
        list-style: none;
        padding: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
    }
    .btn {
        display: inline-block;
        padding: 12px 28px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
        transition: all 0.3s ease;
        border: 2px solid transparent;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        cursor: pointer;
    }
    .btn-success {
        background: linear-gradient(145deg, #D3D3D3, #D3D3D3);
        color: black;
        border: 5px solid #e6b8af;
    }
</style>
{% endblock %}
